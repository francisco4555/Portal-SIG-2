<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>Portal SIG</title>


<!-- LEAFLET -->

<link rel="stylesheet"

href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>


<style>


html,body{

height:100%;
margin:0;
font-family:Arial,sans-serif;

}


#contenedor{

display:flex;
height:100vh;

}


#panel{

width:300px;
padding:20px;
box-sizing:border-box;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,.15);
overflow-y:auto;

}


#map{

flex:1;
height:100%;

}


h1{

margin-top:0;
color:#17324d;

}


h2{

color:#17324d;

}


#estado{

padding:10px;
margin-top:15px;
background:#EEF3F7;
border-radius:8px;

}


.capa{

margin-top:15px;

}


@media(max-width:700px){

#contenedor{

flex-direction:column;

}


#panel{

width:100%;
height:260px;

}


#map{

height:calc(100vh - 260px);

}

}


</style>

</head>


<body>


<div id="contenedor">



<!-- PANEL -->

<div id="panel">


<h1>Portal SIG</h1>


<h2>Capas</h2>


<div class="capa">

<input type="checkbox"
id="mostrar"
checked>

Mostrar Shapefile

</div>



<div id="estado">

Cargando capa...

</div>


<hr>


<p>

Latitud:
<span id="lat"></span>

</p>


<p>

Longitud:
<span id="lon"></span>

</p>



</div>



<!-- MAPA -->


<div id="map">

</div>



</div>



<!-- LIBRERIAS -->


<script src=
"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">

</script>



<script src=
"https://unpkg.com/shpjs@latest/dist/shp.min.js">

</script>




<script>



var map=L.map("map").setView(

[19.4326,-99.1332],

10

);




L.tileLayer(

'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,

attribution:

'&copy; OpenStreetMap'

}).addTo(map);




//ESCALA


L.control.scale().addTo(map);




//COORDENADAS



map.on('mousemove',

function(e){


document.getElementById("lat")

.innerHTML=

e.latlng.lat.toFixed(6);



document.getElementById("lon")

.innerHTML=

e.latlng.lng.toFixed(6);


});





//ARCHIVO ZIP



const archivoZIP=

"capa_leaflet.zip";



var miCapa=null;





shp(archivoZIP)

.then(function(datos){


miCapa=L.featureGroup();




const capas=Array.isArray(datos)

?datos:[datos];




capas.forEach(function(geojson){



var capa=L.geoJSON(

geojson,

{


style:function(){


return{

color:"#c62828",

weight:2,

fillColor:"#FF9800",

fillOpacity:.50


};


},



pointToLayer:function(

feature,

latlng

){


return L.circleMarker(

latlng,

{

radius:6,

color:"#c62828",

fillColor:"#FF9800",

fillOpacity:.90


});


},



onEachFeature:function(

feature,

layer

){



var props=

feature.properties||{};



var contenido=

"<b>Información</b><br>";



for(

var campo in props

){



contenido+=

"<b>"+campo+

":</b> "+

props[campo]

+"<br>";



}



layer.bindPopup(

contenido

);


}



});



miCapa.addLayer(

capa

);



});





miCapa.addTo(map);




if(

miCapa.getBounds()

.isValid()

){


map.fitBounds(

miCapa.getBounds()

);


}




document

.getElementById("estado")

.innerHTML=

"Capa cargada correctamente.";



})



.catch(function(error){


console.log(error);


document

.getElementById("estado")

.innerHTML=

"No se pudo cargar el SHP.";



});





//MOSTRAR Y OCULTAR



document

.getElementById("mostrar")

.addEventListener(

"change",

function(){



if(!miCapa)

return;




if(this.checked){


miCapa.addTo(map);


}


else{


map.removeLayer(

miCapa

);


}



});



</script>


</body>

</html>
